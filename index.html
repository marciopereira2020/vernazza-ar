<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vernazza Ultra-Compact 2026</title>
    <style>
        :root { --bg: #f8f9fa; --primary: #2c3e50; --trailer: #3498db; --carrinho: #e67e22; --tenda: #9b59b6; --kombi: #16a085; --free: #e0e0e0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 5px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Cabeçalho minúsculo */
        .header { background: var(--primary); color: white; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; margin-bottom: 5px; }
        .btn-sync { background: #fff; color: var(--primary); border: none; padding: 3px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 11px; }

        /* Área de scroll horizontal (meses lado a lado) */
        .dashboard { flex: 1; display: flex; gap: 5px; overflow-x: auto; align-items: flex-start; padding-bottom: 10px; }
        
        .month-box { background: white; border: 1px solid #ddd; border-radius: 4px; display: flex; flex-direction: column; min-width: 180px; height: 95%; }
        .month-name { background: #eee; text-align: center; font-weight: bold; font-size: 10px; padding: 3px; text-transform: uppercase; border-bottom: 1px solid #ddd; }

        .grid { display: grid; grid-template-columns: 25px repeat(4, 1fr); background: #ddd; gap: 1px; flex: 1; overflow-y: auto; }
        .h-col { background: #fdfdfd; padding: 2px; text-align: center; font-size: 8px; font-weight: bold; color: #999; }
        
        .day-cell { background: white; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; }
        .weekend { background: #fff9e6; }

        .slot { height: 18px; background: white; padding: 1px; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 0.5px solid #f0f0f0; }
        .slot.drag-over { background: #e3f2fd; }

        .card { width: 100%; height: 100%; border-radius: 2px; color: white; font-size: 7.5px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: grab; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; }
        .card-trailer { background: var(--trailer); }
        .card-carrinho { background: var(--carrinho); }
        .card-tenda { background: var(--tenda); }
        .card-kombi { background: var(--kombi); }
        
        .free-dot { width: 4px; height: 4px; background: var(--free); border-radius: 50%; opacity: 0.3; }

        /* Esconder scrollbars para ficar mais limpo */
        .dashboard::-webkit-scrollbar { height: 6px; }
        .dashboard::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-size: 12px; font-weight: bold;">VERNAZZA OPS 2026</span>
        <button id="auth_button" class="btn-sync">SINCRONIZAR</button>
    </div>

    <div class="dashboard" id="calendar-root">
        </div>

    <script>
        const CLIENT_ID = '194497053838-vrdmv2d54jafsdlik4g8a14k36obkmlk.apps.googleusercontent.com'; 
        const API_KEY = 'AIzaSyB-FXQurs_X3FjSqJv6iNNFHwtaYCivLCw';
        const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
        const SCOPES = "https://www.googleapis.com/auth/calendar.readonly";
        let tokenClient;

        function gapiInit() { gapi.load('client', () => gapi.client.init({apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC]})); }
        function gisInit() { tokenClient = google.accounts.oauth2.initTokenClient({client_id: CLIENT_ID, scope: SCOPES, callback: async (r) => { if(!r.error) await load(); }}); }
        document.getElementById('auth_button').onclick = () => tokenClient.requestAccessToken({prompt: 'consent'});

        async function load() {
            const res = await gapi.client.calendar.events.list({'calendarId': 'primary', 'timeMin': '2026-01-01T00:00:00Z', 'timeMax': '2026-12-31T23:59:59Z', 'singleEvents': true, 'orderBy': 'startTime'});
            render(res.result.items || []);
        }

        function render(events) {
            const root = document.getElementById('calendar-root');
            root.innerHTML = '';
            const map = {};

            events.forEach(e => {
                let start = new Date(e.start.dateTime || e.start.date);
                let end = new Date(e.end.dateTime || e.end.date);
                let curr = new Date(start);
                while (curr < end) {
                    const iso = curr.toISOString().split('T')[0];
                    if (!map[iso]) map[iso] = [];
                    map[iso].push(e.summary);
                    curr.setDate(curr.getDate() + 1);
                }
            });

            const hoje = new Date();
            const mesesNomes = ["JAN", "FEV", "MAR", "ABR", "MAI", "JUN", "JUL", "AGO", "SET", "OUT", "NOV", "DEZ"];

            for (let m = 0; m < 12; m++) {
                const monthBox = document.createElement('div');
                monthBox.className = 'month-box';
                monthBox.innerHTML = `<div class="month-name">${mesesNomes[m]}</div>`;
                const grid = document.createElement('div');
                grid.className = 'grid';
                grid.innerHTML = `<div class="h-col">D</div><div class="h-col">T</div><div class="h-col">C</div><div class="h-col">T</div><div class="h-col">K</div>`;

                const ultimoDia = new Date(2026, m + 1, 0).getDate();
                for (let d = 1; d <= ultimoDia; d++) {
                    const dt = new Date(2026, m, d);
                    const iso = dt.toISOString().split('T')[0];
                    const evs = map[iso] || [];
                    const isWknd = dt.getDay() === 0 || dt.getDay() === 6;

                    // Mostra o dia se tiver evento OU for fds (Sáb/Dom)
                    if (evs.length > 0 || isWknd) addRow(grid, dt, evs);
                }
                monthBox.appendChild(grid);
                root.appendChild(monthBox);
            }
        }

        function addRow(grid, date, evs) {
            const cell = document.createElement('div');
            cell.className = `day-cell ${date.getDay() === 0 || date.getDay() === 6 ? 'weekend' : ''}`;
            cell.innerHTML = `${date.getDate()}`;
            grid.appendChild(cell);

            const ops = ['trailer', 'carrinho', 'tenda', 'kombi'];
            let slots = ["", "", "", ""];
            if (evs.length === 1) slots[0] = evs[0];
            else evs.forEach((v, i) => { if(i < 4) slots[i] = v; });

            slots.forEach((txt, i) => {
                const s = document.createElement('div');
                s.className = 'slot';
                s.ondragover = (e) => { e.preventDefault(); s.classList.add('drag-over'); };
                s.ondragleave = () => s.classList.remove('drag-over');
                s.ondrop = (e) => {
                    e.preventDefault();
                    s.classList.remove('drag-over');
                    const id = e.dataTransfer.getData("text");
                    const el = document.getElementById(id);
                    if (s.querySelector('.free-dot')) s.querySelector('.free-dot').remove();
                    s.appendChild(el);
                };

                if (txt === "") {
                    s.innerHTML = `<div class="free-dot"></div>`;
                } else {
                    const c = document.createElement('div');
                    c.className = `card card-${ops[i]}`;
                    c.innerText = txt;
                    c.draggable = true;
                    c.id = 'id-' + Math.random().toString(36).substr(2, 5);
                    c.ondragstart = (e) => e.dataTransfer.setData("text", e.target.id);
                    s.appendChild(c);
                }
                grid.appendChild(s);
            });
        }
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiInit()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisInit()"></script>
</body>
</html>
