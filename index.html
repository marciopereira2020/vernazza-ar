<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>St Patrick AR</title>
  <link rel="stylesheet" href="style.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "mindar-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.4/dist/mindar-image-three.prod.js"
    }
  }
  </script>

</head>
<body>

  <!-- INTRO -->
  <div id="intro-screen">
    <video id="brandVideo" autoplay muted loop playsinline>
      <source src="brand_bg.mp4" type="video/mp4">
    </video>
    <button id="startAR">Tirar foto com St. Patrick 🍀</button>
  </div>

  <!-- AR CONTAINER -->
  <div id="ar-container" class="hidden"></div>

  <button id="captureBtn" class="hidden">📸 Tirar Foto</button>

  <script type="module" src="app.js"></script>
</body>
</html>
