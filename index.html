<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
<style>
       body { margin: 0; overflow: hidden; }
       #start-screen {
           position: fixed; top: 0; left: 0; width: 100%; height: 100%;
           background: white; z-index: 9999;
           display: flex; flex-direction: column; align-items: center; justify-content: center;
       }
       #btn { padding: 20px; background: #E1306C; color: white; border: none; border-radius: 10px; font-size: 18px; }
       #debug-info { position: absolute; top: 0; background: rgba(0,0,0,0.5); color: white; font-size: 10px; z-index: 10001; pointer-events: none; }
</style>
</head>
<body>
<div id="debug-info">Aguardando...</div>
<div id="start-screen">
<h2>Vernazza AR</h2>
<button id="btn">CLIQUE PARA INICIAR</button>
</div>
<a-scene
       mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false;"
       embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights"
       vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
<a-assets>
<video id="vid" src="./assets/video-animacao.mp4" playsinline webkit-playsinline loop="true"></video>
</a-assets>
<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
<a-entity mindar-image-target="targetIndex: 0" id="target">
<a-video src="#vid" width="1" height="1"></a-video>
</a-entity>
</a-scene>
<script>
       const sceneEl = document.querySelector('a-scene');
       const debug = document.querySelector('#debug-info');
       // Log de carregamento
       sceneEl.addEventListener('componentinitialized', (evt) => {
           if (evt.detail.name === 'mindar-image') {
               debug.innerText = "Sistema MindAR pronto!";
           }
       });
       document.querySelector('#btn').addEventListener('click', () => {
           debug.innerText = "Iniciando câmera...";
           // Tenta dar play no vídeo
           const video = document.querySelector('#vid');
           video.play().then(() => video.pause());
           // Inicia a cena
           const startAR = () => {
               const system = sceneEl.systems['mindar-image-system'];
               if (system) {
                   system.start();
                   document.querySelector('#start-screen').style.display = 'none';
               } else {
                   debug.innerText = "Erro: Sistema não carregou o arquivo .mind";
                   console.error("Verifique se ./assets/targets.mind existe na Vercel");
               }
           };
           startAR();
       });
       // Evento de detecção
       document.querySelector('#target').addEventListener("targetFound", () => {
           document.querySelector('#vid').play();
       });
</script>
</body>
</html>
