<script>
    // --- CONFIGURAÇÃO ---
    const CLIENT_ID = '194497053838-lghct08qmbqog0pmo1041bpts4tl9aaj.apps.googleusercontent.com'; 
    const API_KEY = 'AIzaSyB-FXQurs_X3FjSqJv6iNNFHwtaYCivLCw';
    // -------------------

    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
    const SCOPES = "https://www.googleapis.com/auth/calendar.readonly";
    
    let tokenClient;
    let gapiInited = false;
    let gisInited = false;

    // Função que verifica se tudo carregou antes de liberar o botão
    function checkBeforeStart() {
        if (gapiInited && gisInited) {
            console.log("Sistema pronto para login.");
        }
    }

    async function initializeGapi() {
        try {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: [DISCOVERY_DOC],
            });
            gapiInited = true;
            checkBeforeStart();
        } catch (e) {
            console.error("Erro ao iniciar GAPI:", e);
        }
    }

    function initializeGis() {
        try {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: async (resp) => {
                    if (resp.error !== undefined) throw (resp);
                    await loadEvents();
                },
            });
            gisInited = true;
            checkBeforeStart();
        } catch (e) {
            console.error("Erro ao iniciar GIS:", e);
        }
    }

    // Carregamento Seguro
    function gapiLoaded() {
        gapi.load('client', initializeGapi);
    }

    function gisLoaded() {
        initializeGis();
    }

    // Espera o documento carregar para evitar o erro de 'null'
window.addEventListener('load', function() {
    const loginBtn = document.getElementById('auth_button');
    
    if (loginBtn) {
        loginBtn.onclick = () => {
            if (tokenClient) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                alert("O sistema de login ainda está carregando. Aguarde um instante.");
            }
        };
    }
});
    
    
   
    // ... (mantenha suas funções loadEvents e renderYear aqui abaixo) ...

    async function loadEvents() {
    console.log("Iniciando busca de eventos...");
    try {
        const response = await gapi.client.calendar.events.list({
            'calendarId': 'primary',
            'timeMin': (new Date(2026, 0, 1)).toISOString(), // 01/01/2026
            'timeMax': (new Date(2026, 11, 31)).toISOString(), // 31/12/2026
            'showDeleted': false,
            'singleEvents': true,
            'orderBy': 'startTime',
        });

        const events = response.result.items;
        
        console.log("Eventos recebidos:", events);

        if (!events || events.length === 0) {
            alert("Atenção: O Google não retornou nenhum evento para o ano de 2026 na sua agenda principal.");
            // Mesmo sem eventos, vamos desenhar os finais de semana como você pediu
            renderYear([]); 
            return;
        }

        renderYear(events);

    } catch (err) {
        console.error("Erro detalhado da API:", err);
        alert("Erro ao buscar eventos. Verifique o console (F12).");
    }
}
</script>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
