<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>St. Patrick AR - Estabilizado</title>
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
<style>
       #debug-panel {
           position: absolute; top: 10px; left: 10px;
           padding: 10px; background: rgba(0, 0, 0, 0.85);
           color: #00FF00; font-family: monospace; font-size: 12px;
           z-index: 1000; border-radius: 5px; pointer-events: none;
       }
       .ui-container {
           position: absolute; bottom: 30px; width: 100%;
           display: flex; justify-content: center; z-index: 1000;
       }
       .btn-fix {
           padding: 18px 30px; border-radius: 50px; border: 2px solid white;
           background: #2ed573; color: white; font-weight: bold; font-size: 16px;
       }
</style>
</head>
<body style="margin: 0; overflow: hidden;">
<div id="debug-panel">
<div>📍 GPS: <span id="gps-status">Aguardando...</span></div>
<div id="distance-info">Distância: ---</div>
</div>
<div class="ui-container">
<button class="btn-fix" id="set-pos">📍 FIXAR OBJETO AQUI</button>
</div>
<a-scene
       vr-mode-ui="enabled: false"
       embedded
       arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
       renderer="antialias: true; colorManagement: true;"
>
<a-light type="ambient" intensity="1.2"></a-light>
<a-light type="directional" position="1 4 2" intensity="1"></a-light>
<a-entity
           id="st-patrick-model"
           gltf-model="url(./st_patrick.glb)"
           scale="4 4 4"
           visible="false"
></a-entity>
<a-camera gps-camera="gpsMinDistance: 1; alert: true;" rotation-reader></a-camera>
</a-scene>
<script>
       const model = document.getElementById('st-patrick-model');
       const gpsStatus = document.getElementById('gps-status');
       const distInfo = document.getElementById('distance-info');
       let userLat, userLon;
       // Escuta o GPS através do próprio AR.js (evita travar a câmera)
       window.addEventListener('gps-camera-update-position', (e) => {
           userLat = e.detail.position.latitude;
           userLon = e.detail.position.longitude;
           gpsStatus.innerText = `${userLat.toFixed(5)}, ${userLon.toFixed(5)}`;
           // Se o objeto já estiver fixado, atualiza a distância na tela
           const objPos = model.getAttribute('gps-entity-place');
           if (objPos) {
               const d = calculateDistance(userLat, userLon, objPos.latitude, objPos.longitude);
               distInfo.innerText = `Distância: ${d.toFixed(2)} metros`;
           }
       });
       document.getElementById('set-pos').addEventListener('click', () => {
           if (!userLat || !userLon) {
               alert("GPS ainda não sincronizou. Aguarde um segundo.");
               return;
           }
           // Fixa o objeto exatamente onde você está
           model.setAttribute('gps-entity-place', {
               latitude: userLat,
               longitude: userLon
           });
           model.setAttribute('visible', 'true');
           alert("Objeto fixado no chão! Agora afaste-se para vê-lo.");
       });
       function calculateDistance(lat1, lon1, lat2, lon2) {
           const R = 6371000;
           const dLat = (lat2 - lat1) * Math.PI / 180;
           const dLon = (lon2 - lon1) * Math.PI / 180;
           const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
           const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
           return R * c;
       }
</script>
</body>
</html>
