<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta charset="UTF-8" />
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
<style>

        /* Força a ocupação total da tela no iPhone */

        html, body {

            margin: 0;

            padding: 0;

            width: 100%;

            height: 100%;

            overflow: hidden;

            position: fixed; /* Evita o scroll "elástico" do iOS */

        }

        #start-screen {

            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

            background: white; z-index: 9999;

            display: flex; flex-direction: column; align-items: center; justify-content: center;

        }

        #btn { 

            padding: 20px 40px; background: #E1306C; color: white; 

            border: none; border-radius: 30px; font-size: 18px; font-weight: bold;

        }

        /* Ajuste para que a câmera preencha tudo */

        .a-canvas {

            width: 100% !important;

            height: 100% !important;

            top: 0 !important;

            left: 0 !important;

            position: absolute !important;

        }
</style>
</head>
<body>
<div id="start-screen">
<h2 style="font-family: sans-serif;">Vernazza AR</h2>
<button id="btn">ABRIR CÂMERA FULLSCREEN</button>
</div>
<a-scene 

        mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; filterMinCF:0.0001; filterBeta: 0.001; missTolerance: 50;" 

        embedded 

        color-space="sRGB" 

        renderer="colorManagement: true, physicallyCorrectLights" 

        vr-mode-ui="enabled: false" 

        device-orientation-permission-ui="enabled: false">
<a-assets>
<video id="vid" src="./assets/video-animacao.mp4" playsinline webkit-playsinline loop="true" crossorigin="anonymous"></video>
</a-assets>
<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
<a-entity mindar-image-target="targetIndex: 0" id="target">
<a-video src="#vid" width="1.5" height="1.5" position="0 0 0"></a-video>
</a-entity>
</a-scene>
<script>

        const sceneEl = document.querySelector('a-scene');

        document.querySelector('#btn').addEventListener('click', () => {

            // 1. Tenta liberar o vídeo

            const video = document.querySelector('#vid');

            video.play().then(() => video.pause());

            // 2. Inicia o sistema de AR

            const system = sceneEl.systems['mindar-image-system'];

            if (system) {

                system.start(); 

                document.querySelector('#start-screen').style.display = 'none';

            }

            // 3. Forçar redimensionamento após abrir a câmera

            window.dispatchEvent(new Event('resize'));

        });

        const target = document.querySelector('#target');

        const video = document.querySelector('#vid');

        target.addEventListener("targetFound", () => {

            console.log("Detectado!");

            video.play();

        });

        target.addEventListener("targetLost", () => {

            video.pause();

        });
</script>
</body>
</html>
