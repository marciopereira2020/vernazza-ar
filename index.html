<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>St. Patrick AR Geo-Location</title>
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
<style>
       .buttons {
           position: absolute;
           bottom: 20px;
           left: 0; width: 100%;
           display: flex; justify-content: center;
           z-index: 10;
       }
       .snap-button {
           padding: 15px;
           border-radius: 50%;
           border: 5px solid white;
           background: rgba(0, 0, 0, 0.5);
           color: white;
           cursor: pointer;
       }
</style>
</head>
<body style="margin: 0; overflow: hidden;">
<div class="buttons">
<button class="snap-button" id="snap">📸</button>
</div>
<a-scene
       vr-mode-ui="enabled: false"
       embedded
       arjs="sourceType: webcam; debugUIEnabled: false;"
>
<a-entity
           id="st-patrick-model"
           gltf-model="url(./st_patrick_dance.glb)"
           scale="5 5 5"
           look-at="[gps-camera]"
           gps-entity-place="latitude: -22.83075798147388 ; longitude: -47.21576766108264;"
></a-entity>
<a-camera gps-camera rotation-reader></a-camera>
</a-scene>
<script>
       // Lógica simples para "Tirar Foto"
       document.getElementById('snap').addEventListener('click', () => {
           const scene = document.querySelector('a-scene');
           const video = document.querySelector('video');
           const canvas = scene.components.screenshot.getCanvas('perspective');
           // Cria um canvas temporário para mesclar o vídeo da câmera com o objeto 3D
           const finalCanvas = document.createElement('canvas');
           finalCanvas.width = canvas.width;
           finalCanvas.height = canvas.height;
           const ctx = finalCanvas.getContext('2d');
           // Desenha o fundo (vídeo) e depois o AR (canvas)
           ctx.drawImage(video, 0, 0, finalCanvas.width, finalCanvas.height);
           ctx.drawImage(canvas, 0, 0);
           // Download da imagem
           const link = document.createElement('a');
           link.download = 'foto-st-patrick.png';
           link.href = finalCanvas.toDataURL('image/png');
           link.click();
       });
</script>
</body>
</html>
