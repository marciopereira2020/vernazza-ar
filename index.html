<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta charset="UTF-8" />
<title>Vernazza AR - Painel Interativo</title>
<script src="//cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js"></script>
<style>
       body { margin: 0; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }
       /* Tela de Boas-vindas (Necessária para o Safari liberar Câmera e Som) */
       #start-screen {
           position: fixed; top: 0; left: 0; width: 100%; height: 100%;
           background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
           z-index: 10000; display: flex; flex-direction: column;
           align-items: center; justify-content: center; text-align: center;
       }
       #start-button {
           padding: 18px 45px; font-size: 20px; font-weight: bold; cursor: pointer;
           background-color: #E1306C; color: white; border: none; border-radius: 50px;
           box-shadow: 0 10px 20px rgba(225, 48, 108, 0.3); transition: transform 0.2s;
       }
       #start-button:active { transform: scale(0.95); }
       /* Botão do Instagram (Aparece na detecção) */
       #ui-overlay {
           position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
           z-index: 1000; display: none;
       }
       .btn-insta {
           background: #E1306C; color: white; border: none; padding: 15px 30px;
           border-radius: 50px; font-weight: bold; text-decoration: none;
           display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
       }
</style>
</head>
<body>
<div id="start-screen">
<h1 style="color: #333;">Vernazza Gelateria</h1>
<p style="color: #666; max-width: 80%; margin-bottom: 40px;">Toque no botão abaixo para ativar a Realidade Aumentada e aponte para o nosso painel!</p>
<button id="start-button">ATIVAR MÁGICA</button>
</div>
<div id="ui-overlay">
<a href="https://instagram.com/vernazzagelateria" target="_blank" class="btn-insta">
           Siga-nos no Instagram! 🍦
</a>
</div>
<a-scene
       mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading:yes;"
       embedded
       color-space="sRGB"
       renderer="colorManagement: true, physicallyCorrectLights"
       vr-mode-ui="enabled: false"
       device-orientation-permission-ui="enabled: false">
<a-assets>
<video id="vid" src="./assets/video-animacao.mp4"
                  preload="auto" loop="true" crossorigin="anonymous"
                  playsinline webkit-playsinline></video>
</a-assets>
<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
<a-entity mindar-image-target="targetIndex: 0" id="target">
<a-video src="#vid" width="1" height="1" position="0 0 0"></a-video>
</a-entity>
</a-scene>
<script>
       const sceneEl = document.querySelector('a-scene');
       const startScreen = document.querySelector('#start-screen');
       const startButton = document.querySelector('#start-button');
       const target = document.querySelector('#target');
       const video = document.querySelector('#vid');
       const overlay = document.querySelector('#ui-overlay');
       // Função de Inicialização Segura
       const initAR = () => {
           console.log("Iniciando componentes...");
           // 1. Tenta dar um play mudo para "acordar" o motor de vídeo do iOS
           video.play().then(() => {
               video.pause();
               video.muted = false; // Queremos áudio se o vídeo tiver
           }).catch(e => console.log("Aguardando interação para vídeo"));
           // 2. Tenta iniciar o sistema de AR
           const startSystem = () => {
               const arSystem = sceneEl.systems['mindar-image-system'];
               if (arSystem) {
                   arSystem.start();
                   startScreen.style.display = 'none';
                   console.log("AR Iniciada com sucesso!");
               } else {
                   console.log("Sistema MindAR ainda não carregado, tentando novamente...");
                   setTimeout(startSystem, 200); // Tenta de novo em 200ms
               }
           };
           startSystem();
       };
       // Clique no botão principal
       startButton.addEventListener('click', initAR);
       // Eventos de detecção do Painel
       target.addEventListener("targetFound", () => {
           console.log("Painel Vernazza Detectado!");
           video.play().catch(e => console.error("Erro ao tocar vídeo:", e));
           overlay.style.display = "block";
       });
       target.addEventListener("targetLost", () => {
           video.pause();
           overlay.style.display = "none";
       });
</script>
</body>
</html>
