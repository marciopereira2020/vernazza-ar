<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St. Patrick Photo Ops 🍀</title>
<style>
       body {
           margin: 0; background: #013220; color: white;
           font-family: sans-serif; text-align: center;
           display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
       }
       .container { width: 80%; max-width: 400px; }
       .logo { width: 100px; margin-bottom: 20px; }
       .instructions { font-size: 1.1rem; margin-bottom: 30px; line-height: 1.4; }
       /* O link AR precisa de um estilo de botão chamativo */
       .ar-link {
           display: block; background: #ffd700; color: #000;
           padding: 20px; border-radius: 50px; font-weight: bold;
           text-decoration: none; font-size: 1.2rem;
           box-shadow: 0 4px 15px rgba(0,0,0,0.3);
       }
</style>
</head>
<body>
<div class="container">
<img src="logo-truck.png" class="logo" alt="Logo">
<div class="instructions">
           Encontre o St. Patrick e <br><strong>tire uma foto com ele!</strong> 📸
</div>
<a rel="ar" href="st_patrick.usdz">
<img src="preview-patrick.jpg" style="width: 100%; border-radius: 15px; margin-bottom: 15px;">
<div class="ar-link">VER NO MEU MUNDO 🍀</div>
</a>
<p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.7;">
           * Requer iPhone com iOS 12 ou superior.
</p>
</div>
</body>
</html>
