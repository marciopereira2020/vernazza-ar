<script>
    // --- CONFIGURAÇÃO ---
    const CLIENT_ID = '194497053838-lghct08qmbqog0pmo1041bpts4tl9aaj.apps.googleusercontent.com'; 
    const API_KEY = 'AIzaSyB-FXQurs_X3FjSqJv6iNNFHwtaYCivLCw';
    // -------------------

    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
    const SCOPES = "https://www.googleapis.com/auth/calendar.readonly";
    
    let tokenClient;
    let gapiInited = false;
    let gisInited = false;

    // Função que verifica se tudo carregou antes de liberar o botão
    function checkBeforeStart() {
        if (gapiInited && gisInited) {
            console.log("Sistema pronto para login.");
        }
    }

    async function initializeGapi() {
        try {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: [DISCOVERY_DOC],
            });
            gapiInited = true;
            checkBeforeStart();
        } catch (e) {
            console.error("Erro ao iniciar GAPI:", e);
        }
    }

    function initializeGis() {
        try {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: async (resp) => {
                    if (resp.error !== undefined) throw (resp);
                    await loadEvents();
                },
            });
            gisInited = true;
            checkBeforeStart();
        } catch (e) {
            console.error("Erro ao iniciar GIS:", e);
        }
    }

    // Carregamento Seguro
    function gapiLoaded() {
        gapi.load('client', initializeGapi);
    }

    function gisLoaded() {
        initializeGis();
    }

    document.getElementById('auth_button').onclick = () => {
        if (tokenClient) {
            tokenClient.requestAccessToken({prompt: 'consent'});
        } else {
            alert("O sistema ainda está carregando. Aguarde 2 segundos.");
        }
    };

    // ... (mantenha suas funções loadEvents e renderYear aqui abaixo) ...
</script>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
