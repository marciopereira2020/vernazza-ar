<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>St Patrick AR</title>
  <link rel="stylesheet" href="style.css" />

  <!-- IMPORT MAP (RESOLVE O ERRO DO THREE) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

</head>
<body>

  <div id="intro-screen">
    <video id="brandVideo" autoplay muted loop playsinline>
      <source src="brand_bg.mp4" type="video/mp4">
    </video>

    <div id="canvas-container"></div>

    <button id="startAR">Tirar foto com St. Patrick 🍀</button>
  </div>

  <div id="ar-screen" class="hidden">
    <video id="camera" autoplay playsinline></video>
    <canvas id="ar-canvas"></canvas>
    <button id="captureBtn">📸 Tirar Foto</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
