<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vernazza - Futuros 2026</title>
    <style>
        :root { --bg: #f0f2f5; --primary: #2c3e50; --trailer: #3498db; --carrinho: #e67e22; --tenda: #9b59b6; --kombi: #16a085; --free: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { position: sticky; top: 0; background: var(--primary); color: white; padding: 10px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .btn-sync { background: #fff; color: var(--primary); border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .container { padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .month-box { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .month-name { background: #eee; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; color: #555; font-size: 0.85em; }
        .grid { display: grid; grid-template-columns: 60px repeat(4, 1fr); background: #ddd; gap: 1px; }
        .h-col { background: #f9f9f9; padding: 5px; text-align: center; font-size: 0.65em; font-weight: bold; color: #888; }
        .day-cell { background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.85em; border-right: 1px solid #eee; }
        .weekend { background: #fffcf0; }
        .slot { min-height: 40px; background: white; padding: 3px; display: flex; align-items: center; justify-content: center; position: relative; }
        .card { width: 100%; height: 100%; border-radius: 4px; color: white; font-size: 10px; padding: 3px; cursor: move; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 500; }
        .card-trailer { background: var(--trailer); }
        .card-carrinho { background: var(--carrinho); }
        .card-tenda { background: var(--tenda); }
        .card-kombi { background: var(--kombi); }
        .free-text { color: var(--free); font-size: 8px; font-weight: bold; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight: bold; font-size: 0.9em;">VERNAZZA • HOJE EM DIANTE</span>
        <button id="auth_button" class="btn-sync">SINCRONIZAR</button>
    </div>

    <div class="container" id="calendar-root"></div>

    <script>
        const CLIENT_ID = 'SEU_CLIENT_ID'; 
        const API_KEY = 'SUA_API_KEY';

        const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
        const SCOPES = "https://www.googleapis.com/auth/calendar.readonly";
        let tokenClient;

        function gapiInit() { gapi.load('client', () => gapi.client.init({apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC]})); }
        function gisInit() { tokenClient = google.accounts.oauth2.initTokenClient({client_id: CLIENT_ID, scope: SCOPES, callback: async (r) => { if(!r.error) await load(); }}); }
        document.getElementById('auth_button').onclick = () => tokenClient.requestAccessToken({prompt: 'consent'});

        async function load() {
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0); // Começa do início do dia de hoje

            const res = await gapi.client.calendar.events.list({
                'calendarId': 'primary', 
                'timeMin': hoje.toISOString(), 
                'timeMax': '2026-12-31T23:59:59Z', 
                'singleEvents': true, 
                'orderBy': 'startTime'
            });
            render(res.result.items || []);
        }

        function render(events) {
            const root = document.getElementById('calendar-root');
            root.innerHTML = '';
            const map = {};
            events.forEach(e => { const d = e.start.date || e.start.dateTime.split('T')[0]; if(!map[d]) map[d] = []; map[d].push(e.summary); });

            const hoje = new Date();
            hoje.setHours(0,0,0,0);
            const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

            for (let m = hoje.getMonth(); m < 12; m++) {
                const monthBox = document.createElement('div');
                monthBox.className = 'month-box';
                monthBox.innerHTML = `<div class="month-name">${mesesNomes[m]}</div>`;
                const grid = document.createElement('div');
                grid.className = 'grid';
                grid.innerHTML = `<div class="h-col">DATA</div><div class="h-col">TRAILER</div><div class="h-col">CARRINHO</div><div class="h-col">TENDA</div><div class="h-col">KOMBI</div>`;

                const ultimoDia = new Date(2026, m + 1, 0).getDate();
                let hasVisibleDays = false;

                for (let d = 1; d <= ultimoDia; d++) {
                    const dataAtual = new Date(2026, m, d);
                    if (dataAtual < hoje) continue; // Pula dias que já passaram

                    const iso = dataAtual.toISOString().split('T')[0];
                    const evs = map[iso] || [];
                    const isWknd = dataAtual.getDay() === 0 || dataAtual.getDay() === 6;

                    if (evs.length > 0 || isWknd) {
                        hasVisibleDays = true;
                        addRow(grid, dataAtual, evs);
                    }
                }
                if (hasVisibleDays) { monthBox.appendChild(grid); root.appendChild(monthBox); }
            }
        }

        function addRow(grid, date, evs) {
            const cell = document.createElement('div');
            cell.className = `day-cell ${date.getDay() === 0 || date.getDay() === 6 ? 'weekend' : ''}`;
            cell.innerHTML = `<span>${date.getDate()}</span><small>${['Dom','Seg','Ter','Qua','Qui','Sex','Sab'][date.getDay()]}</small>`;
            grid.appendChild(cell);

            const opNames = ['trailer', 'carrinho', 'tenda', 'kombi'];
            let slots = ["FREE", "FREE", "FREE", "FREE"];
            if (evs.length === 1) slots[0] = evs[0];
            else evs.forEach((v, i) => { if(i < 4) slots[i] = v; });

            slots.forEach((txt, i) => {
                const s = document.createElement('div');
                s.className = 'slot';
                if (txt === "FREE") s.innerHTML = `<div class="free-text">FREE</div>`;
                else {
                    const c = document.createElement('div');
                    c.className = `card card-${opNames[i]}`;
                    c.innerText = txt;
                    s.appendChild(c);
                }
                grid.appendChild(s);
            });
        }
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiInit()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisInit()"></script>
</body>
</html>
