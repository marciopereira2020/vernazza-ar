<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR Estável</title>
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
<style>
       #debug-panel {
           position: absolute; top: 10px; left: 10px; z-index: 1000;
           padding: 8px; background: rgba(0,0,0,0.7); color: lime;
           font-family: monospace; font-size: 11px; border-radius: 5px;
       }
       .ui-container {
           position: absolute; bottom: 20px; width: 100%;
           display: flex; justify-content: center; z-index: 1000;
       }
       .btn-fix {
           padding: 15px 25px; background: #28a745; color: white;
           border: none; border-radius: 25px; font-weight: bold;
       }
</style>
</head>
<body style="margin: 0; overflow: hidden;">
<div id="debug-panel">
       GPS: <span id="status">Aguardando...</span><br>
       Dist: <span id="dist">---</span>
</div>
<div class="ui-container">
<button class="btn-fix" id="set-pos">📍 FIXAR AQUI</button>
</div>
<a-scene
       vr-mode-ui="enabled: false"
       embedded
       arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth:640; sourceHeight:480; displayWidth:640; displayHeight:480;"
       renderer="precision: medium; antialias: false; alpha: true;"
>
<a-light type="ambient" intensity="1.5"></a-light>
<a-entity
           id="st-patrick-model"
           gltf-model="url(./st_patrick.glb)"
           scale="5 5 5"
           visible="false"
></a-entity>
<a-camera gps-camera="gpsMinDistance: 2; maxDistance: 50;" rotation-reader></a-camera>
</a-scene>
<script>
       const model = document.getElementById('st-patrick-model');
       let userLat, userLon;
       window.addEventListener('gps-camera-update-position', (e) => {
           userLat = e.detail.position.latitude;
           userLon = e.detail.position.longitude;
           document.getElementById('status').innerText = "OK";
           const objPos = model.getAttribute('gps-entity-place');
           if (objPos) {
               const d = calculateDistance(userLat, userLon, objPos.latitude, objPos.longitude);
               document.getElementById('dist').innerText = d.toFixed(1) + "m";
           }
       });
       document.getElementById('set-pos').addEventListener('click', () => {
           if (!userLat) return alert("Sinal GPS fraco...");
           model.setAttribute('gps-entity-place', { latitude: userLat, longitude: userLon });
           model.setAttribute('visible', 'true');
           alert("Fixado! Afaste-se um pouco.");
       });
       function calculateDistance(lat1, lon1, lat2, lon2) {
           const R = 6371000;
           const dLat = (lat2 - lat1) * Math.PI / 180;
           const dLon = (lon2 - lon1) * Math.PI / 180;
           const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
           return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
       }
</script>
</body>
</html>
