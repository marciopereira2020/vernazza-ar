<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js"></script>
<style>
     body { margin: 0; overflow: hidden; }
     #ui-overlay {
       position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
       z-index: 1000; display: none;
     }
     .btn-insta {
       background: #E1306C; color: white; border: none; padding: 10px 20px;
       border-radius: 20px; font-family: sans-serif; cursor: pointer;
     }
</style>
</head>
<body>
<div id="ui-overlay">
<button class="btn-insta" onclick="window.location.href='https://instagram.com/seu_perfil'">
       Siga no Instagram!
</button>
</div>
<a-scene
     mindar-image="imageTargetSrc: ./assets/targets.mind;"
     color-space="sRGB"
     renderer="colorManagement: true, physicallyCorrectLights"
     vr-mode-ui="enabled: false"
     device-orientation-permission-ui="enabled: false">
<a-assets>
<video id="vid" src="./assets/video-animacao.mp4" loop="true" crossorigin="anonymous"></video>
</a-assets>
<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
<a-entity mindar-image-target="targetIndex: 0" id="target">
<a-video src="#vid" width="1" height="1" position="0 0 0" rotation="0 0 0"></a-video>
</a-entity>
</a-scene>
<script>
     const target = document.querySelector('#target');
     const video = document.querySelector('#vid');
     const overlay = document.querySelector('#ui-overlay');
     // Detecta quando o iPhone "achou" o painel
     target.addEventListener("targetFound", event => {
       video.play(); // Inicia animação
       overlay.style.display = "block"; // Mostra botão do Instagram
     });
     target.addEventListener("targetLost", event => {
       video.pause();
       overlay.style.display = "none";
     });
</script>
</body>
</html>
