<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>St. Patrick AR - Corrigido</title>
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
<style>
       .buttons {
           position: absolute;
           bottom: 30px;
           left: 0;
           width: 100%;
           display: flex;
           justify-content: center;
           z-index: 999;
       }
       .snap-button {
           padding: 20px;
           border-radius: 50%;
           border: 4px solid white;
           background: rgba(0, 0, 0, 0.6);
           color: white;
           font-size: 24px;
           cursor: pointer;
           box-shadow: 0 0 10px rgba(0,0,0,0.5);
       }
       .snap-button:active { transform: scale(0.9); }
</style>
</head>
<body style="margin: 0; overflow: hidden;">
<div class="buttons">
<button class="snap-button" id="snap">📸</button>
</div>
<a-scene
       vr-mode-ui="enabled: false"
       embedded
       arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
       renderer="antialias: true; colorManagement: true;"
>
<a-light type="ambient" intensity="1.5"></a-light>
<a-light type="directional" position="1 1 1" intensity="1"></a-light>
<a-entity
           id="st-patrick-model"
           gltf-model="url(./st_patrick_dance.glb)"
           scale="1 1 1"
           position="0 -1.5 0"
           look-at="[gps-camera]"
           gps-entity-place="latitude: -22.83075798147388 ; longitude:-47.21576766108264;"></a-entity>
       <a-camera gps-camera="simulateLatitude: -22.83075798147388 ; simulateLongitude:-22.83075798147388" rotation-reader>
              </a-camera>
 </a-scene>
<script>
       // Lógica de Foto (Captura o Canvas do A-Frame + Vídeo da Câmera)
       document.getElementById('snap').addEventListener('click', () => {
           const scene = document.querySelector('a-scene');
           const video = document.querySelector('video');
           // Pega o snapshot do objeto 3D
           const canvas = scene.components.screenshot.getCanvas('perspective');
           const finalCanvas = document.createElement('canvas');
           finalCanvas.width = video.videoWidth;
           finalCanvas.height = video.videoHeight;
           const ctx = finalCanvas.getContext('2d');
           // 1. Desenha a imagem da câmera ao fundo
           ctx.drawImage(video, 0, 0, finalCanvas.width, finalCanvas.height);
           // 2. Desenha o objeto 3D por cima
           ctx.drawImage(canvas, 0, 0, finalCanvas.width, finalCanvas.height);
           // Download automático
           const link = document.createElement('a');
           link.download = 'ar-capture.png';
           link.href = finalCanvas.toDataURL('image/png');
           link.click();
       });
</script>
</body>
</html>
